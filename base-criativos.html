<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Orlando — Base de Criativos</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060608;font-family:'Montserrat',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.02)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ===== HEADER ===== */
.header{text-align:center;padding:30px 30px 0;position:relative}
.header::after{content:'';display:block;width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(212,165,32,0.3),transparent);margin:20px auto 0}
.header-top{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:8px;flex-wrap:wrap}
.brand{font-size:28px;font-weight:900;letter-spacing:6px;text-transform:uppercase}
.brand .av{background:linear-gradient(135deg,#D4A520,#E6C44A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand .rest{color:rgba(255,255,255,0.4)}
.panel-title{font-size:13px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.15);margin-top:6px}
.header-link{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-decoration:none;color:#D4A520;opacity:0.5;transition:opacity 0.3s;padding:8px 16px;border:1px solid rgba(212,165,32,0.2);border-radius:6px}
.header-link:hover{opacity:1;border-color:#D4A520;background:rgba(212,165,32,0.08)}

/* ===== STATS BAR ===== */
.stats-bar{display:flex;gap:12px;justify-content:center;padding:20px 30px;flex-wrap:wrap}
.stat-chip{padding:10px 20px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;text-align:center;min-width:120px}
.stat-chip-num{font-size:24px;font-weight:900;line-height:1;margin-bottom:2px}
.stat-chip-label{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3)}

/* ===== MAIN LAYOUT ===== */
.main-layout{display:grid;grid-template-columns:320px 1fr 320px;gap:0;height:calc(100vh - 180px);min-height:500px}

/* ===== LEFT SIDEBAR: LIBRARY ===== */
.library{background:rgba(255,255,255,0.015);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden}
.library-header{padding:16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.library-title{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:10px}
.library-search{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;transition:border-color 0.3s}
.library-search:focus{border-color:rgba(212,165,32,0.4)}
.library-search::placeholder{color:rgba(255,255,255,0.2)}
.library-filters{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.filter-pill{padding:4px 8px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.3);transition:all 0.2s;font-family:'Montserrat',sans-serif}
.filter-pill:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.6)}
.filter-pill.active{color:#fff}
.filter-pill[data-cat="domingo"].active,.filter-pill[data-cat="domingo"]:hover{border-color:#D4A520;color:#D4A520;background:rgba(212,165,32,0.1)}
.filter-pill[data-cat="gc"].active,.filter-pill[data-cat="gc"]:hover{border-color:#a78bfa;color:#a78bfa;background:rgba(167,139,250,0.1)}
.filter-pill[data-cat="billy"].active,.filter-pill[data-cat="billy"]:hover{border-color:#F59E0B;color:#F59E0B;background:rgba(245,158,11,0.1)}
.filter-pill[data-cat="leao"].active,.filter-pill[data-cat="leao"]:hover{border-color:#F97316;color:#F97316;background:rgba(249,115,22,0.1)}
.filter-pill[data-cat="worship"].active,.filter-pill[data-cat="worship"]:hover{border-color:#a855f7;color:#a855f7;background:rgba(168,85,247,0.1)}
.filter-pill[data-cat="wgc"].active,.filter-pill[data-cat="wgc"]:hover{border-color:#ec4899;color:#ec4899;background:rgba(236,72,153,0.1)}
.library-list{flex:1;overflow-y:auto;padding:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;align-content:start}
.lib-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;border-radius:8px;cursor:pointer;transition:all 0.2s;border:1px solid transparent;position:relative}
.lib-card:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.06)}
.lib-card.dragging{opacity:0.4}
.lib-card-preview{width:100%;aspect-ratio:9/16;border-radius:6px;overflow:hidden;position:relative;background:#111}
.lib-card-preview iframe{width:1080px;height:1920px;border:none;transform:scale(0.0667);transform-origin:top left;pointer-events:none}
.lib-card-info{width:100%;text-align:center}
.lib-card-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-card-phrase{font-size:7px;font-weight:300;color:rgba(255,255,255,0.35);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lib-card-cat{display:inline-block;font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:3px;margin-top:3px}
.lib-card-drag-handle{position:absolute;top:4px;right:4px;width:20px;height:20px;border-radius:4px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:grab;opacity:0;transition:opacity 0.2s;z-index:2}
.lib-card:hover .lib-card-drag-handle{opacity:1}
.lib-card-drag-handle:hover{background:rgba(212,165,32,0.3);border-color:#D4A520}
.lib-card-drag-handle svg{width:12px;height:12px;fill:rgba(255,255,255,0.6)}

/* ===== CALENDAR CENTER ===== */
.calendar-area{display:flex;flex-direction:column;overflow:hidden}
.cal-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,0.06);flex-wrap:wrap;gap:8px}
.cal-nav{display:flex;align-items:center;gap:12px}
.cal-nav-btn{background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.2s;font-family:'Montserrat',sans-serif;display:flex;align-items:center;justify-content:center}
.cal-nav-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.cal-month-label{font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;min-width:200px;text-align:center}
.cal-views{display:flex;gap:4px}
.cal-view-btn{padding:6px 14px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);border-radius:5px;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif}
.cal-view-btn:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}
.cal-view-btn.active{border-color:rgba(212,165,32,0.4);color:#D4A520;background:rgba(212,165,32,0.06)}
.cal-today-btn{padding:6px 14px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:rgba(212,165,32,0.08);border:1px solid rgba(212,165,32,0.3);color:#D4A520;border-radius:5px;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif}
.cal-today-btn:hover{background:rgba(212,165,32,0.15);border-color:#D4A520}

/* Calendar Grid */
.cal-grid{flex:1;overflow-y:auto;padding:8px 12px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-weekday{text-align:center;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:8px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{min-height:90px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:6px;cursor:pointer;transition:all 0.2s;position:relative}
.cal-cell:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1)}
.cal-cell.other-month{opacity:0.25}
.cal-cell.today{border-color:rgba(212,165,32,0.5);box-shadow:0 0 20px rgba(212,165,32,0.08)}
.cal-cell.drag-over{border-color:rgba(212,165,32,0.6);background:rgba(212,165,32,0.04);box-shadow:0 0 20px rgba(212,165,32,0.1)}
.cal-date{font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);margin-bottom:4px}
.cal-cell.today .cal-date{color:#D4A520;font-weight:800}
.cal-pills{display:flex;flex-direction:column;gap:2px}
.cal-pill{display:flex;align-items:center;gap:4px;padding:2px 6px;border-radius:4px;font-size:8px;font-weight:600;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-pill:hover{filter:brightness(1.3)}
.cal-pill .pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-pill .pill-label{overflow:hidden;text-overflow:ellipsis}
.cal-more{font-size:8px;font-weight:600;color:rgba(255,255,255,0.3);padding:2px 6px;cursor:pointer}
.cal-more:hover{color:rgba(255,255,255,0.6)}

/* Week view */
.cal-week-grid{flex:1;overflow-y:auto;padding:8px 12px}
.cal-week-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-week-day-header{text-align:center;padding:8px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
.cal-week-day-header .week-date{font-size:18px;font-weight:800;color:rgba(255,255,255,0.4);letter-spacing:0;text-transform:none;margin-top:4px;display:block}
.cal-week-day-header.today .week-date{color:#D4A520}
.cal-week-cols{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;min-height:400px}
.cal-week-col{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);border-radius:6px;padding:8px;cursor:pointer;transition:all 0.2s}
.cal-week-col:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1)}
.cal-week-col.today{border-color:rgba(212,165,32,0.5)}
.cal-week-col.drag-over{border-color:rgba(212,165,32,0.6);background:rgba(212,165,32,0.04)}
.week-pill{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;margin-bottom:4px;cursor:pointer;transition:all 0.2s}
.week-pill:hover{filter:brightness(1.2)}
.week-pill .pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.week-pill .pill-text{font-size:9px;font-weight:600;letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.week-pill .pill-time{font-size:8px;font-weight:400;color:rgba(255,255,255,0.3);margin-left:auto;flex-shrink:0}

/* ===== RIGHT SIDEBAR: DETAIL ===== */
.detail-panel{background:rgba(255,255,255,0.015);border-left:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden}
.detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0.2}
.detail-empty svg{opacity:0.3}
.detail-empty-text{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.detail-content{flex:1;overflow-y:auto;padding:16px}
.detail-preview{width:100%;aspect-ratio:9/16;max-height:300px;border-radius:10px;overflow:hidden;margin-bottom:16px;background:#111;position:relative}
.detail-preview iframe{width:1080px;height:1920px;border:none;transform-origin:top left;pointer-events:none}
.detail-section{margin-bottom:16px}
.detail-label{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.detail-status-group{display:flex;gap:4px}
.status-btn{flex:1;padding:8px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif}
.status-btn:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}
.status-btn.active-pendente{border-color:rgba(212,165,32,0.5);color:#D4A520;background:rgba(212,165,32,0.1)}
.status-btn.active-agendado{border-color:rgba(96,165,250,0.5);color:#60a5fa;background:rgba(96,165,250,0.1)}
.status-btn.active-postado{border-color:rgba(20,184,166,0.5);color:#14b8a6;background:rgba(20,184,166,0.1)}
.detail-platforms{display:flex;flex-wrap:wrap;gap:4px}
.plat-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif}
.plat-btn:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}
.plat-btn.active{border-color:rgba(212,165,32,0.4);color:#D4A520;background:rgba(212,165,32,0.08)}
.plat-btn svg{width:14px;height:14px;fill:currentColor}
.detail-input{width:100%;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;transition:border-color 0.3s}
.detail-input:focus{border-color:rgba(212,165,32,0.4)}
.detail-textarea{width:100%;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;outline:none;resize:vertical;min-height:60px;transition:border-color 0.3s}
.detail-textarea:focus{border-color:rgba(212,165,32,0.4)}
.detail-row{display:flex;gap:8px}
.detail-row>*{flex:1}
.caption-wrapper{position:relative}
.caption-copy{position:absolute;top:6px;right:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:3px 8px;border-radius:4px;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s}
.caption-copy:hover{background:rgba(212,165,32,0.1);border-color:rgba(212,165,32,0.3);color:#D4A520}
.detail-actions{display:flex;gap:8px;padding:16px;border-top:1px solid rgba(255,255,255,0.06)}
.btn-save{flex:1;padding:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;border-radius:6px;cursor:pointer;background:linear-gradient(135deg,#D4A520,#B8860B);color:#000;font-family:'Montserrat',sans-serif;transition:all 0.2s}
.btn-save:hover{filter:brightness(1.2);transform:translateY(-1px)}
.btn-delete{padding:10px 16px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(239,68,68,0.3);border-radius:6px;cursor:pointer;background:rgba(239,68,68,0.06);color:#ef4444;font-family:'Montserrat',sans-serif;transition:all 0.2s}
.btn-delete:hover{background:rgba(239,68,68,0.15);border-color:#ef4444}

/* ===== LIGHTBOX MODAL ===== */
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.lightbox-overlay.open{display:flex}
.lightbox{background:rgba(15,15,20,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:480px;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,0.6)}
.lightbox-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.lightbox-header-info{display:flex;flex-direction:column;gap:2px}
.lightbox-label{font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.lightbox-cat{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:0.5}
.lightbox-close{background:none;border:none;color:rgba(255,255,255,0.3);font-size:24px;cursor:pointer;padding:4px 8px;transition:color 0.2s}
.lightbox-close:hover{color:#fff}
.lightbox-preview{width:100%;padding:0 24px;margin:20px 0}
.lightbox-preview-frame{width:100%;aspect-ratio:9/16;max-height:50vh;border-radius:12px;overflow:hidden;background:#111;position:relative}
.lightbox-preview-frame iframe{width:1080px;height:1920px;border:none;transform-origin:top left;pointer-events:none}
.lightbox-phrase{padding:0 24px;font-size:12px;font-weight:300;color:rgba(255,255,255,0.5);line-height:1.5;text-align:center;font-style:italic;margin-bottom:16px}
.lightbox-actions{display:flex;gap:8px;padding:16px 24px 24px;justify-content:center}
.lightbox-btn{padding:10px 20px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.2s;text-decoration:none;display:flex;align-items:center;gap:6px}
.lightbox-btn-primary{background:linear-gradient(135deg,#D4A520,#B8860B);color:#000;border:none}
.lightbox-btn-primary:hover{filter:brightness(1.2);transform:translateY(-1px)}
.lightbox-btn-secondary{background:transparent;color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15)}
.lightbox-btn-secondary:hover{border-color:rgba(255,255,255,0.4);color:#fff}

/* ===== SCHEDULE MODAL (from lightbox) ===== */
.schedule-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1100;display:none;align-items:center;justify-content:center;padding:20px}
.schedule-overlay.open{display:flex}
.schedule-modal{background:rgba(15,15,20,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:360px;padding:28px;box-shadow:0 40px 100px rgba(0,0,0,0.5)}
.schedule-title{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:6px}
.schedule-creative-name{font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.schedule-field{margin-bottom:16px}
.schedule-field label{display:block;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:6px}
.schedule-field input{width:100%;padding:10px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color 0.3s}
.schedule-field input:focus{border-color:rgba(212,165,32,0.4)}
.schedule-actions{display:flex;gap:8px;margin-top:24px}
.schedule-actions .lightbox-btn{flex:1;justify-content:center}

/* ===== QUICK ADD MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:rgba(15,15,20,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 40px 100px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-title{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.modal-date{font-size:11px;font-weight:600;color:#D4A520;margin-left:10px}
.modal-close{background:none;border:none;color:rgba(255,255,255,0.3);font-size:20px;cursor:pointer;padding:4px 8px;transition:color 0.2s}
.modal-close:hover{color:#fff}
.modal-search{padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.04)}
.modal-search input{width:100%;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;outline:none}
.modal-search input::placeholder{color:rgba(255,255,255,0.2)}
.modal-grid{flex:1;overflow-y:auto;padding:16px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.modal-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:all 0.2s}
.modal-card:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1)}
.modal-card-preview{width:72px;height:128px;border-radius:6px;overflow:hidden;background:#111;position:relative}
.modal-card-preview iframe{width:1080px;height:1920px;border:none;transform:scale(0.0667);transform-origin:top left;pointer-events:none}
.modal-card-label{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;text-align:center}
.modal-card-cat{font-size:7px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.4}

/* ===== TOAST ===== */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:1px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;box-shadow:0 8px 30px rgba(0,0,0,0.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}
.toast-success{background:rgba(20,184,166,0.15);border:1px solid rgba(20,184,166,0.3);color:#14b8a6}
.toast-info{background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.3);color:#60a5fa}
.toast-warning{background:rgba(212,165,32,0.15);border:1px solid rgba(212,165,32,0.3);color:#D4A520}
.toast-error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#ef4444}

/* ===== CATEGORY COLORS ===== */
.cat-domingo{color:#D4A520}
.cat-gc{color:#a78bfa}
.cat-billy{color:#F59E0B}
.cat-leao{color:#F97316}
.cat-worship{color:#a855f7}
.cat-wgc{color:#ec4899}
.bg-domingo{background:rgba(212,165,32,0.12)}
.bg-gc{background:rgba(167,139,250,0.12)}
.bg-billy{background:rgba(245,158,11,0.12)}
.bg-leao{background:rgba(249,115,22,0.12)}
.bg-worship{background:rgba(168,85,247,0.12)}
.bg-wgc{background:rgba(236,72,153,0.12)}

/* ===== TOUCH MODE INDICATOR ===== */
.touch-indicator{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:8px 16px;background:rgba(212,165,32,0.15);border:1px solid rgba(212,165,32,0.3);border-radius:8px;font-size:10px;font-weight:600;letter-spacing:1px;color:#D4A520;z-index:800;white-space:nowrap}
.touch-indicator.visible{display:block;animation:toastIn 0.3s ease}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){

function getCreativeHtml(fileKey) {
  const b64 = CREATIVE_HTML[fileKey];
  if (!b64) return '';
  return atob(b64);
}

function getCreativeBlobUrl(fileKey) {
  const html = getCreativeHtml(fileKey);
  if (!html) return '';
  const blob = new Blob([html], { type: 'text/html' });
  return URL.createObjectURL(blob);
}

function downloadCreativeHtml(creative) {
  const html = getCreativeHtml(creative.file);
  if (!html) return;
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = creative.id + '.html';
  a.click();
  URL.revokeObjectURL(url);
}


const MONTHS_PT = ['Janeiro','Fevereiro','Mar\u00e7o','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT = ['Dom','Seg','Ter','Qua','Qui','Sex','S\u00e1b'];

/* ============================================================
   STATE
   ============================================================ */
let state = loadState();
let currentView = state.preferences.defaultView || 'month';
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let viewWeekStart = getWeekStart(new Date());
let selectedPostId = null;
let activeFilter = 'all';
let searchQuery = '';
let modalDate = null;
let touchSelectedCreative = null;
let isTouchDevice = false;
let lightboxCreativeId = null;

function getWeekStart(d) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() - dt.getDay());
  dt.setHours(0,0,0,0);
  return dt;
}

/* ============================================================
   PERSISTENCE
   ============================================================ */
function loadState() {
  try {
    const raw = localStorage.getItem('av-base-criativos');
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { version:1, posts:[], preferences:{ defaultView:'month' } };
}

function saveState() {
  localStorage.setItem('av-base-criativos', JSON.stringify(state));
  updateStats();
}

/* ============================================================
   TOAST
   ============================================================ */
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ============================================================
   STATS
   ============================================================ */
function updateStats() {
  const posts = state.posts;
  document.getElementById('stat-pendente').textContent = posts.filter(p => p.status === 'pendente').length;
  document.getElementById('stat-agendado').textContent = posts.filter(p => p.status === 'agendado').length;
  document.getElementById('stat-postado').textContent = posts.filter(p => p.status === 'postado').length;
  document.getElementById('stat-total').textContent = posts.length;
}

/* ============================================================
   LIBRARY (with lightbox on click, drag on handle)
   ============================================================ */
function renderLibrary() {
  const list = document.getElementById('lib-list');
  list.innerHTML = '';
  const filtered = CREATIVES.filter(c => {
    if (activeFilter !== 'all' && c.category !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return c.label.toLowerCase().includes(q) || c.phrase.toLowerCase().includes(q) || c.category.toLowerCase().includes(q);
    }
    return true;
  });
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'lib-card';
    card.dataset.id = c.id;
    card.innerHTML = `
      <div class="lib-card-drag-handle" draggable="true" title="Arrastar para agenda">
        <svg viewBox="0 0 24 24"><path d="M8 6h2v2H8V6zm6 0h2v2h-2V6zM8 11h2v2H8v-2zm6 0h2v2h-2v-2zm-6 5h2v2H8v-2zm6 0h2v2h-2v-2z"/></svg>
      </div>
      <div class="lib-card-preview" data-src="${c.file}"></div>
      <div class="lib-card-info">
        <div class="lib-card-label" style="color:${c.color}">${c.label}</div>
        <div class="lib-card-phrase">${c.phrase}</div>
        <div class="lib-card-cat" style="color:${c.color};background:${c.color}15;border:1px solid ${c.color}30;border-radius:3px">${CAT_LABELS[c.category]}</div>
      </div>`;

    // Drag from the handle
    const handle = card.querySelector('.lib-card-drag-handle');
    handle.addEventListener('dragstart', e => {
      e.stopPropagation();
      e.dataTransfer.setData('text/plain', c.id);
      card.classList.add('dragging');
      isTouchDevice = false;
    });
    handle.addEventListener('dragend', () => card.classList.remove('dragging'));

    // Click on card opens lightbox
    card.addEventListener('click', e => {
      if (e.target.closest('.lib-card-drag-handle')) return;
      // Touch mode: tap to select for drag
      if (isTouchDevice || window.innerWidth <= 1200) {
        if (touchSelectedCreative === c.id) {
          touchSelectedCreative = null;
          card.classList.remove('selected');
          hideTouchIndicator();
          return;
        }
        document.querySelectorAll('.lib-card.selected').forEach(el => el.classList.remove('selected'));
        touchSelectedCreative = c.id;
        card.classList.add('selected');
        showTouchIndicator('Toque em uma data no calend\u00e1rio para adicionar');
        return;
      }
      openLightbox(c.id);
    });

    list.appendChild(card);
  });
  observeIframes();
}

// Lazy load iframes
function observeIframes() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const container = entry.target;
        if (!container.querySelector('iframe')) {
          const src = container.dataset.src;
          if (src) {
            const iframe = document.createElement('iframe');
            const htmlContent = getCreativeHtml(src);
            if (htmlContent) {
              iframe.srcdoc = htmlContent;
            } else {
              iframe.src = src;
            }
            iframe.loading = 'lazy';
            container.appendChild(iframe);
          }
        }
        observer.unobserve(container);
      }
    });
  }, { rootMargin: '200px' });
  document.querySelectorAll('.lib-card-preview[data-src]').forEach(el => observer.observe(el));
}

/* ============================================================
   CALENDAR RENDERING
   ============================================================ */
function renderCalendar() {
  if (currentView === 'month') renderMonthView();
  else renderWeekView();
  updateMonthLabel();
}

function updateMonthLabel() {
  const label = document.getElementById('cal-month-label');
  if (currentView === 'month') {
    label.textContent = MONTHS_PT[viewMonth] + ' ' + viewYear;
  } else {
    const end = new Date(viewWeekStart);
    end.setDate(end.getDate() + 6);
    if (viewWeekStart.getMonth() === end.getMonth()) {
      label.textContent = viewWeekStart.getDate() + ' \u2013 ' + end.getDate() + ' ' + MONTHS_PT[viewWeekStart.getMonth()] + ' ' + viewWeekStart.getFullYear();
    } else {
      label.textContent = viewWeekStart.getDate() + ' ' + MONTHS_PT[viewWeekStart.getMonth()].substring(0,3) + ' \u2013 ' + end.getDate() + ' ' + MONTHS_PT[end.getMonth()].substring(0,3) + ' ' + end.getFullYear();
    }
  }
}

function renderMonthView() {
  const grid = document.getElementById('cal-grid');
  const today = new Date();
  const todayStr = dateStr(today);
  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay = new Date(viewYear, viewMonth + 1, 0);
  const startDay = firstDay.getDay();
  const totalDays = lastDay.getDate();

  let html = '<div class="cal-weekdays">';
  DAYS_PT.forEach(d => html += '<div class="cal-weekday">' + d + '</div>');
  html += '</div><div class="cal-days">';

  // Previous month cells
  const prevMonth = new Date(viewYear, viewMonth, 0);
  for (let i = startDay - 1; i >= 0; i--) {
    const day = prevMonth.getDate() - i;
    const dt = new Date(viewYear, viewMonth - 1, day);
    html += renderMonthCell(dt, true, todayStr);
  }

  // Current month
  for (let d = 1; d <= totalDays; d++) {
    const dt = new Date(viewYear, viewMonth, d);
    html += renderMonthCell(dt, false, todayStr);
  }

  // Next month
  const totalCells = startDay + totalDays;
  const remaining = (7 - (totalCells % 7)) % 7;
  for (let d = 1; d <= remaining; d++) {
    const dt = new Date(viewYear, viewMonth + 1, d);
    html += renderMonthCell(dt, true, todayStr);
  }

  html += '</div>';
  grid.innerHTML = html;
  attachCalendarEvents();
}

function renderMonthCell(dt, otherMonth, todayStr) {
  const ds = dateStr(dt);
  const isToday = ds === todayStr;
  const posts = getPostsForDate(ds);
  const maxPills = 3;
  let cls = 'cal-cell';
  if (otherMonth) cls += ' other-month';
  if (isToday) cls += ' today';

  let html = `<div class="${cls}" data-date="${ds}"><div class="cal-date">${dt.getDate()}</div><div class="cal-pills">`;

  posts.slice(0, maxPills).forEach(p => {
    const cr = getCreative(p.creativeId);
    if (!cr) return;
    const statusColor = STATUS_COLORS[p.status] || '#666';
    html += `<div class="cal-pill bg-${cr.category}" data-post-id="${p.id}" title="${cr.label} - ${p.status}">
      <span class="pill-dot" style="background:${statusColor}"></span>
      <span class="pill-label" style="color:${cr.color}">${cr.label}</span>
    </div>`;
  });

  if (posts.length > maxPills) {
    html += `<div class="cal-more">+${posts.length - maxPills} mais</div>`;
  }

  html += '</div></div>';
  return html;
}

function renderWeekView() {
  const grid = document.getElementById('cal-grid');
  const today = new Date();
  const todayStr = dateStr(today);

  let html = '<div class="cal-week-header">';
  for (let i = 0; i < 7; i++) {
    const dt = new Date(viewWeekStart);
    dt.setDate(dt.getDate() + i);
    const ds = dateStr(dt);
    const isToday = ds === todayStr;
    html += `<div class="cal-week-day-header ${isToday ? 'today' : ''}">${DAYS_PT[i]}<span class="week-date">${dt.getDate()}</span></div>`;
  }
  html += '</div><div class="cal-week-cols">';

  for (let i = 0; i < 7; i++) {
    const dt = new Date(viewWeekStart);
    dt.setDate(dt.getDate() + i);
    const ds = dateStr(dt);
    const isToday = ds === todayStr;
    const posts = getPostsForDate(ds);

    html += `<div class="cal-week-col ${isToday ? 'today' : ''}" data-date="${ds}">`;
    posts.forEach(p => {
      const cr = getCreative(p.creativeId);
      if (!cr) return;
      const statusColor = STATUS_COLORS[p.status] || '#666';
      html += `<div class="week-pill bg-${cr.category}" data-post-id="${p.id}">
        <span class="pill-dot" style="background:${statusColor}"></span>
        <span class="pill-text" style="color:${cr.color}">${cr.label}</span>
        <span class="pill-time">${p.time || ''}</span>
      </div>`;
    });
    html += '</div>';
  }

  html += '</div>';
  grid.innerHTML = html;
  attachCalendarEvents();
}

function attachCalendarEvents() {
  // Drag over cells
  document.querySelectorAll('.cal-cell, .cal-week-col').forEach(cell => {
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drag-over');
      const creativeId = e.dataTransfer.getData('text/plain');
      if (creativeId && cell.dataset.date) {
        createPost(creativeId, cell.dataset.date);
      }
    });
    // Click on cell to open quick-add (if empty area clicked)
    cell.addEventListener('click', e => {
      if (e.target.closest('.cal-pill, .week-pill, .cal-more')) return;
      // Touch mode: if creative selected, create post
      if (touchSelectedCreative) {
        createPost(touchSelectedCreative, cell.dataset.date);
        touchSelectedCreative = null;
        document.querySelectorAll('.lib-card.selected').forEach(el => el.classList.remove('selected'));
        hideTouchIndicator();
        return;
      }
      openQuickAdd(cell.dataset.date);
    });
  });

  // Click on pills to select post
  document.querySelectorAll('.cal-pill, .week-pill').forEach(pill => {
    pill.addEventListener('click', e => {
      e.stopPropagation();
      selectPost(pill.dataset.postId);
    });
  });

  // Click on "+N mais" to open quick-add
  document.querySelectorAll('.cal-more').forEach(more => {
    more.addEventListener('click', e => {
      e.stopPropagation();
      const cell = more.closest('.cal-cell');
      if (cell) openQuickAdd(cell.dataset.date);
    });
  });
}

/* ============================================================
   NAVIGATION
   ============================================================ */
document.getElementById('cal-prev').addEventListener('click', () => {
  if (currentView === 'month') {
    viewMonth--;
    if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  } else {
    viewWeekStart.setDate(viewWeekStart.getDate() - 7);
  }
  renderCalendar();
});

document.getElementById('cal-next').addEventListener('click', () => {
  if (currentView === 'month') {
    viewMonth++;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  } else {
    viewWeekStart.setDate(viewWeekStart.getDate() + 7);
  }
  renderCalendar();
});

document.getElementById('cal-today').addEventListener('click', () => {
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  viewWeekStart = getWeekStart(now);
  renderCalendar();
});

document.querySelectorAll('.cal-view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cal-view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    state.preferences.defaultView = currentView;
    saveState();
    if (currentView === 'week') {
      viewWeekStart = getWeekStart(new Date(viewYear, viewMonth, 1));
    }
    renderCalendar();
  });
});

/* ============================================================
   POST CRUD
   ============================================================ */
function createPost(creativeId, date, time) {
  const cr = getCreative(creativeId);
  if (!cr) return;
  const post = {
    id: 'post-' + Date.now(),
    creativeId: creativeId,
    date: date,
    time: time || cr.suggestedTime || '19:00',
    platforms: ['instagram-story'],
    status: 'pendente',
    caption: cr.caption || '',
    notes: '',
    createdAt: new Date().toISOString(),
    postedAt: null
  };
  state.posts.push(post);
  saveState();
  renderCalendar();
  selectPost(post.id);
  toast('Post criado!', 'success');
}

function selectPost(postId) {
  selectedPostId = postId;
  const post = state.posts.find(p => p.id === postId);
  if (!post) { clearDetail(); return; }
  const cr = getCreative(post.creativeId);
  if (!cr) { clearDetail(); return; }

  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail-content').style.display = 'block';
  document.getElementById('detail-actions').style.display = 'flex';

  // Preview
  const preview = document.getElementById('detail-preview');
  const previewW = preview.offsetWidth || 288;
  const scale = previewW / 1080;
  const detailHtml = getCreativeHtml(cr.file);
  if (detailHtml) {
    const iframe = document.createElement('iframe');
    iframe.srcdoc = detailHtml;
    iframe.style.cssText = 'transform:scale(' + scale + ');width:1080px;height:1920px;border:none;pointer-events:none';
    preview.innerHTML = '';
    preview.appendChild(iframe);
  } else {
    preview.innerHTML = '<iframe src="' + cr.file + '" style="transform:scale(' + scale + ');width:1080px;height:1920px;border:none;pointer-events:none"></iframe>';
  }

  // Status
  document.querySelectorAll('.status-btn').forEach(btn => {
    btn.className = 'status-btn';
    if (btn.dataset.status === post.status) btn.classList.add('active-' + post.status);
  });

  // Platforms
  document.querySelectorAll('.plat-btn').forEach(btn => {
    btn.classList.toggle('active', post.platforms.includes(btn.dataset.plat));
  });

  // Date/Time
  document.getElementById('detail-date').value = post.date;
  document.getElementById('detail-time').value = post.time;

  // Caption / Notes
  document.getElementById('detail-caption').value = post.caption;
  document.getElementById('detail-notes').value = post.notes;

  // Open panel on mobile
  if (window.innerWidth <= 1200) {
    document.getElementById('detail-panel').classList.add('open');
    document.getElementById('detail-overlay').classList.add('open');
  }
}

function clearDetail() {
  selectedPostId = null;
  document.getElementById('detail-empty').style.display = 'flex';
  document.getElementById('detail-content').style.display = 'none';
  document.getElementById('detail-actions').style.display = 'none';
  if (window.innerWidth <= 1200) {
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('detail-overlay').classList.remove('open');
  }
}

// Status buttons
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const post = state.posts.find(p => p.id === selectedPostId);
    if (!post) return;
    post.status = btn.dataset.status;
    if (post.status === 'postado') post.postedAt = new Date().toISOString();
    document.querySelectorAll('.status-btn').forEach(b => b.className = 'status-btn');
    btn.classList.add('active-' + post.status);
  });
});

// Platform buttons
document.querySelectorAll('.plat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
  });
});

// Save
document.getElementById('btn-save').addEventListener('click', () => {
  const post = state.posts.find(p => p.id === selectedPostId);
  if (!post) return;

  post.date = document.getElementById('detail-date').value;
  post.time = document.getElementById('detail-time').value;
  post.caption = document.getElementById('detail-caption').value;
  post.notes = document.getElementById('detail-notes').value;
  post.platforms = [...document.querySelectorAll('.plat-btn.active')].map(b => b.dataset.plat);

  const activeStatus = document.querySelector('.status-btn[class*="active-"]');
  if (activeStatus) post.status = activeStatus.dataset.status;

  saveState();
  renderCalendar();
  toast('Post salvo!', 'success');
});

// Delete
document.getElementById('btn-delete').addEventListener('click', () => {
  if (!selectedPostId) return;
  state.posts = state.posts.filter(p => p.id !== selectedPostId);
  saveState();
  clearDetail();
  renderCalendar();
  toast('Post exclu\u00eddo', 'error');
});

// Copy caption
document.getElementById('caption-copy').addEventListener('click', () => {
  const caption = document.getElementById('detail-caption').value;
  navigator.clipboard.writeText(caption).then(() => toast('Legenda copiada!', 'info'));
});

// Close detail on overlay click
document.getElementById('detail-overlay').addEventListener('click', clearDetail);

/* ============================================================
   QUICK-ADD MODAL
   ============================================================ */
function openQuickAdd(date) {
  modalDate = date;
  const dt = new Date(date + 'T12:00:00');
  document.getElementById('modal-date').textContent = dt.getDate() + ' de ' + MONTHS_PT[dt.getMonth()] + ', ' + dt.getFullYear();
  document.getElementById('modal-search-input').value = '';
  renderModalGrid('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeQuickAdd() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalDate = null;
}

function renderModalGrid(query) {
  const grid = document.getElementById('modal-grid');
  const q = query.toLowerCase();
  const filtered = CREATIVES.filter(c => {
    if (!q) return true;
    return c.label.toLowerCase().includes(q) || c.phrase.toLowerCase().includes(q) || c.category.toLowerCase().includes(q);
  });
  grid.innerHTML = '';
  filtered.forEach(c => {
    const card = document.createElement('div');
    card.className = 'modal-card';
    card.innerHTML = `
      <div class="modal-card-preview" data-modal-src="${c.file}"></div>
      <div class="modal-card-label" style="color:${c.color}">${c.label}</div>
      <div class="modal-card-cat">${CAT_LABELS[c.category]}</div>`;
    card.addEventListener('click', () => {
      createPost(c.id, modalDate);
      closeQuickAdd();
    });
    grid.appendChild(card);
  });
  // Lazy-load modal iframes
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const container = entry.target;
        if (!container.querySelector('iframe')) {
          const src = container.dataset.modalSrc;
          if (src) {
            const iframe = document.createElement('iframe');
            const modalHtmlContent = getCreativeHtml(src);
            if (modalHtmlContent) {
              iframe.srcdoc = modalHtmlContent;
            } else {
              iframe.src = src;
            }
            iframe.loading = 'lazy';
            container.appendChild(iframe);
          }
        }
        observer.unobserve(container);
      }
    });
  }, { root: grid, rootMargin: '100px' });
  grid.querySelectorAll('.modal-card-preview[data-modal-src]').forEach(el => observer.observe(el));
}

document.getElementById('modal-close').addEventListener('click', closeQuickAdd);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeQuickAdd();
});
document.getElementById('modal-search-input').addEventListener('input', e => {
  renderModalGrid(e.target.value);
});

/* ============================================================
   HELPERS
   ============================================================ */
function getCreative(id) { return CREATIVES.find(c => c.id === id); }
function getPostsForDate(ds) { return state.posts.filter(p => p.date === ds).sort((a,b) => (a.time||'').localeCompare(b.time||'')); }
function dateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
