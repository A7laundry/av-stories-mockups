<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Domingo 05</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(135deg,#0a0804 0%,#100a02 100%);overflow:hidden;padding:120px 80px}
/* Glow rings */
.ring{position:absolute;border-radius:50%;top:46%;left:50%;transform:translate(-50%,-50%);z-index:2}
.r1{width:700px;height:700px;border:2px solid rgba(212,165,32,0.1);box-shadow:0 0 120px rgba(212,165,32,0.04),inset 0 0 120px rgba(212,165,32,0.02)}
.r2{width:900px;height:900px;border:1px solid rgba(212,165,32,0.05)}
.r3{width:1100px;height:1100px;border:1px solid rgba(212,165,32,0.025)}
/* Radial glow */
.glow{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,32,0.06) 0%,transparent 70%);z-index:1;filter:blur(30px)}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
.c{position:relative;z-index:10;text-align:center}
.label{font-size:33px;font-weight:600;letter-spacing:18px;text-transform:uppercase;color:#D4A520;margin-bottom:50px}
.number{font-size:360px;font-weight:900;line-height:0.85;background:linear-gradient(180deg,#D4A520 0%,rgba(212,165,32,0.25) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.unit{font-size:54px;font-weight:300;letter-spacing:30px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:60px}
.hook{font-size:66px;font-weight:700;line-height:1.2;color:#fff;margin-bottom:15px}
.hook span{color:#D4A520}
.sub{font-size:30px;font-weight:400;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:60px;line-height:1.8}
.badge{display:inline-block;border:2px solid #D4A520;color:#D4A520;padding:28px 66px;font-size:30px;font-weight:700;letter-spacing:8px;text-transform:uppercase}
</style>
</head>
<body>
<div class="s">
  <div class="glow"></div>
  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="label">Conta Regressiva</div>
    <div class="number">02</div>
    <div class="unit">Dias</div>
    <div class="hook">Voc&ecirc; est&aacute; <span>pronto?</span></div>
    <div class="sub">Domingo 7PM<br>607 Avalon Road &middot; Winter Garden</div>
    <div class="badge">Te vejo l&aacute;</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
