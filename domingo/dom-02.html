<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Domingo 02</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#050505;overflow:hidden;padding:120px 80px}
/* Light beam from top */
.beam{position:absolute;top:0;left:50%;transform:translateX(-50%);width:4px;height:100%;background:linear-gradient(180deg,rgba(212,165,32,0.25) 0%,rgba(212,165,32,0.04) 40%,transparent 65%);z-index:2}
.beam-w{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:100%;background:linear-gradient(180deg,rgba(212,165,32,0.03) 0%,transparent 50%);z-index:1;filter:blur(40px)}
/* Horizontal glow */
.hglow{position:absolute;top:38%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 10%,rgba(212,165,32,0.08) 40%,rgba(212,165,32,0.12) 50%,rgba(212,165,32,0.08) 60%,transparent 90%);z-index:2}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
.c{position:relative;z-index:10;text-align:center}
.mystery{font-family:'Playfair Display',serif;font-size:54px;font-style:italic;font-weight:400;line-height:1.4;color:rgba(255,255,255,0.7);margin-bottom:30px}
.mystery strong{font-weight:700;font-style:normal;color:#D4A520}
.sub{font-size:36px;font-weight:300;color:rgba(255,255,255,0.35);margin-bottom:80px;line-height:1.5}
.vline{width:2px;height:120px;background:linear-gradient(180deg,transparent,#D4A520,transparent);margin:0 auto 60px}
.day{font-size:36px;font-weight:700;letter-spacing:16px;text-transform:uppercase;color:#D4A520;margin-bottom:10px}
.time{font-size:130px;font-weight:900;letter-spacing:-6px;line-height:1;color:#fff;margin-bottom:12px}
.addr{font-size:28px;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.25)}
</style>
</head>
<body>
<div class="s">
  <div class="beam"></div>
  <div class="beam-w"></div>
  <div class="hglow"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="mystery">&ldquo;Tem algo<br><strong>te esperando</strong><br>nesse domingo.&rdquo;</div>
    <div class="sub">Voc&ecirc; n&atilde;o pode perder<br>o que Deus preparou.</div>
    <div class="vline"></div>
    <div class="day">Domingo</div>
    <div class="time">7PM</div>
    <div class="addr">607 Avalon Road</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
