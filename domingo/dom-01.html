<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Domingo 01</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0804;overflow:hidden;padding:120px 80px}
.orb{position:absolute;border-radius:50%;filter:blur(180px);z-index:1}
.o1{width:800px;height:800px;top:-100px;right:-200px;background:rgba(212,165,32,0.15)}
.o2{width:600px;height:600px;bottom:150px;left:-200px;background:rgba(245,158,11,0.1)}
.o3{width:400px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(249,115,22,0.06)}
.grid{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;opacity:0.03;background:repeating-linear-gradient(90deg,transparent,transparent 179px,rgba(212,165,32,0.3) 179px,rgba(212,165,32,0.3) 180px),repeating-linear-gradient(0deg,transparent,transparent 179px,rgba(212,165,32,0.3) 179px,rgba(212,165,32,0.3) 180px)}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
.c{position:relative;z-index:10;text-align:center}
.pre{font-size:36px;font-weight:200;letter-spacing:16px;text-transform:uppercase;color:rgba(212,165,32,0.4);margin-bottom:40px}
.hook{font-size:90px;font-weight:900;text-transform:uppercase;letter-spacing:-4px;line-height:1.05;margin-bottom:20px}
.hook .white{color:#fff}
.hook .gold{background:linear-gradient(180deg,#D4A520,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.divider{width:180px;height:2px;background:linear-gradient(90deg,transparent,#D4A520,transparent);margin:50px auto}
.day{font-size:42px;font-weight:700;letter-spacing:18px;text-transform:uppercase;color:#D4A520;margin-bottom:12px}
.time{font-size:150px;font-weight:900;letter-spacing:-8px;line-height:1;color:#fff;margin-bottom:15px}
.addr{font-size:30px;font-weight:300;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<div class="s">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="grid"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="pre">Este Domingo</div>
    <div class="hook">
      <span class="white">Esse domingo<br>vai ser</span><br>
      <span class="gold">diferente.</span>
    </div>
    <div class="divider"></div>
    <div class="day">Domingo</div>
    <div class="time">7PM</div>
    <div class="addr">607 Avalon Road &middot; Winter Garden</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
