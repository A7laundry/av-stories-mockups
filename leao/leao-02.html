<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Leão 02 — Força</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#060402;overflow:hidden}
/* Warm dramatic gradient */
.s::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 30%,rgba(212,165,32,0.12) 0%,rgba(140,80,10,0.04) 40%,transparent 65%);z-index:1}
/* Vertical light pillar */
.pillar{position:absolute;top:0;left:50%;transform:translateX(-50%);width:6px;height:100%;background:linear-gradient(180deg,rgba(212,165,32,0.3) 0%,rgba(212,165,32,0.06) 30%,transparent 55%);z-index:2;filter:blur(2px)}
.pillar-w{position:absolute;top:0;left:50%;transform:translateX(-50%);width:500px;height:70%;background:linear-gradient(180deg,rgba(212,165,32,0.05) 0%,transparent 60%);z-index:1;filter:blur(80px)}
/* Shield glow */
.shield-glow{position:absolute;top:22%;left:50%;transform:translateX(-50%);width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(212,165,32,0.06) 0%,transparent 60%);z-index:2;filter:blur(40px)}
/* Sparks */
.spark{position:absolute;border-radius:50%;z-index:3;animation:sp 5s ease-in-out infinite}
.s1{width:3px;height:3px;top:20%;left:25%;background:rgba(255,200,50,0.5);animation-delay:0s}
.s2{width:4px;height:4px;top:30%;left:72%;background:rgba(212,165,32,0.6);animation-delay:-1.5s}
.s3{width:3px;height:3px;top:50%;left:15%;background:rgba(255,180,40,0.4);animation-delay:-3s}
.s4{width:5px;height:5px;top:40%;left:80%;background:rgba(212,165,32,0.5);animation-delay:-0.5s}
.s5{width:3px;height:3px;top:65%;left:60%;background:rgba(245,180,50,0.4);animation-delay:-4s}
@keyframes sp{0%,100%{transform:scale(1);opacity:0.2}30%{transform:scale(2);opacity:0.9}60%{transform:scale(0.5);opacity:0.1}}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
/* Content */
.c{position:relative;z-index:10;text-align:center;padding:0 80px}
/* Shield + Cross SVG */
.shield-wrap{position:relative;z-index:5;margin-bottom:20px}
.shield-wrap svg{filter:drop-shadow(0 0 60px rgba(212,165,32,0.12))}
.tag{font-size:28px;font-weight:200;letter-spacing:20px;text-transform:uppercase;color:rgba(212,165,32,0.35);margin-bottom:30px}
.verse{font-size:50px;font-weight:300;color:rgba(255,255,255,0.5);line-height:1.4;margin-bottom:15px}
.hook{font-size:90px;font-weight:900;text-transform:uppercase;letter-spacing:-4px;line-height:1;margin-bottom:20px;background:linear-gradient(180deg,#fff 10%,#D4A520 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:34px;font-weight:300;color:rgba(255,255,255,0.35);line-height:1.5;margin-bottom:15px}
.ref{font-size:24px;font-weight:700;letter-spacing:10px;text-transform:uppercase;color:#D4A520;margin-bottom:50px}
.badge{display:inline-block;border:2px solid #D4A520;color:#D4A520;padding:26px 60px;font-size:28px;font-weight:700;letter-spacing:6px;text-transform:uppercase;margin-bottom:50px}
.info{font-size:26px;font-weight:400;letter-spacing:8px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="s">
  <div class="pillar"></div>
  <div class="pillar-w"></div>
  <div class="shield-glow"></div>
  <div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div><div class="spark s4"></div><div class="spark s5"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>

  <!-- Shield + Cross + Lion emblem -->
  <div class="shield-wrap">
    <svg width="320" height="380" viewBox="0 0 160 190" fill="none">
      <!-- Shield shape -->
      <path d="M80,6 L150,30 L148,110 C146,148 116,175 80,186 C44,175 14,148 12,110 L10,30 Z" fill="none" stroke="url(#sg1)" stroke-width="1.8" opacity="0.6"/>
      <path d="M80,16 L140,36 L138,108 C136,142 110,165 80,174 C50,165 24,142 22,108 L20,36 Z" fill="none" stroke="url(#sg1)" stroke-width="0.8" opacity="0.25"/>
      <!-- Cross inside shield -->
      <rect x="74" y="40" width="12" height="100" rx="2" fill="url(#sg1)" opacity="0.3"/>
      <rect x="48" y="65" width="64" height="12" rx="2" fill="url(#sg1)" opacity="0.3"/>
      <!-- Crown on top -->
      <path d="M60,8 L68,0 L74,10 L80,2 L86,10 L92,0 L100,8 L96,16 L64,16 Z" fill="url(#sg1)" opacity="0.4"/>
      <defs>
        <linearGradient id="sg1" x1="80" y1="0" x2="80" y2="190" gradientUnits="userSpaceOnUse">
          <stop stop-color="#E6C44A"/>
          <stop offset="0.5" stop-color="#D4A520"/>
          <stop offset="1" stop-color="#8B6914"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="c">
    <div class="tag">For&ccedil;a</div>
    <div class="verse">Tudo posso naquele<br>que me</div>
    <div class="hook">Fortalece.</div>
    <div class="sub">O Le&atilde;o de Jud&aacute; peleja<br>por voc&ecirc;.</div>
    <div class="ref">Filipenses 4:13</div>
    <div class="badge">For&ccedil;a que vem do Alto</div>
    <div class="info">Domingo 7PM &middot; 607 Avalon Rd</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
