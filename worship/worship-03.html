<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Worship 03 — Fogo</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0c0208;overflow:hidden}
/* Multi-color gradient mesh */
.mesh{position:absolute;border-radius:50%;filter:blur(140px);z-index:1}
.m1{width:800px;height:800px;top:-15%;left:50%;transform:translateX(-50%);background:linear-gradient(180deg,rgba(249,115,22,0.3),rgba(236,72,153,0.15))}
.m2{width:600px;height:600px;bottom:-5%;left:-15%;background:rgba(168,85,247,0.15)}
.m3{width:500px;height:500px;bottom:20%;right:-15%;background:rgba(59,130,246,0.1)}
/* Pulse rings from center */
.pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(249,115,22,0.06);z-index:2;animation:pring 4s ease-out infinite}
.p1{width:200px;height:200px;animation-delay:0s}
.p2{width:400px;height:400px;animation-delay:-1s;border-color:rgba(236,72,153,0.05)}
.p3{width:600px;height:600px;animation-delay:-2s;border-color:rgba(168,85,247,0.04)}
.p4{width:800px;height:800px;animation-delay:-3s;border-color:rgba(59,130,246,0.03)}
@keyframes pring{0%{transform:translate(-50%,-50%) scale(0.8);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
/* Hot sparks rising */
.spark{position:absolute;width:3px;border-radius:50%;z-index:3;animation:sparkr 3s linear infinite}
.sp1{height:20px;left:15%;bottom:0;background:linear-gradient(0deg,#f97316,transparent);animation-delay:0s}
.sp2{height:30px;left:30%;bottom:0;background:linear-gradient(0deg,#ec4899,transparent);animation-delay:-0.8s}
.sp3{height:15px;left:48%;bottom:0;background:linear-gradient(0deg,#a855f7,transparent);animation-delay:-1.6s}
.sp4{height:25px;left:65%;bottom:0;background:linear-gradient(0deg,#f97316,transparent);animation-delay:-0.4s}
.sp5{height:20px;left:80%;bottom:0;background:linear-gradient(0deg,#ec4899,transparent);animation-delay:-2s}
.sp6{height:18px;left:38%;bottom:0;background:linear-gradient(0deg,#f97316,transparent);animation-delay:-1.2s}
.sp7{height:22px;left:72%;bottom:0;background:linear-gradient(0deg,#a855f7,transparent);animation-delay:-2.4s}
@keyframes sparkr{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-1920px);opacity:0}}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
/* Content */
.c{position:relative;z-index:10;text-align:center;padding:0 70px}
.emoji-row{font-size:60px;margin-bottom:30px;letter-spacing:20px}
.hook{font-size:80px;font-weight:900;text-transform:uppercase;letter-spacing:-3px;line-height:1.05;margin-bottom:20px}
.hook .fire{background:linear-gradient(180deg,#fb923c,#f97316,#ec4899,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hook .w{color:#fff}
.sub{font-size:36px;font-weight:300;color:rgba(255,255,255,0.4);line-height:1.5;margin-bottom:50px}
.cta{display:inline-block;padding:26px 60px;border-radius:60px;font-size:26px;font-weight:800;letter-spacing:5px;text-transform:uppercase;background:linear-gradient(135deg,#f97316,#ec4899,#a855f7);color:#fff;margin-bottom:20px;box-shadow:0 8px 40px rgba(249,115,22,0.2)}
.time-pill{display:inline-block;padding:16px 40px;border-radius:50px;font-size:20px;font-weight:600;letter-spacing:5px;text-transform:uppercase;border:1.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.4);margin-bottom:40px;backdrop-filter:blur(5px)}
.info{font-size:22px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>
<div class="s">
  <div class="mesh m1"></div><div class="mesh m2"></div><div class="mesh m3"></div>
  <div class="pulse p1"></div><div class="pulse p2"></div><div class="pulse p3"></div><div class="pulse p4"></div>
  <div class="spark sp1"></div><div class="spark sp2"></div><div class="spark sp3"></div><div class="spark sp4"></div><div class="spark sp5"></div><div class="spark sp6"></div><div class="spark sp7"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="emoji-row">&#128293;&#128293;&#128293;</div>
    <div class="hook">
      <span class="w">N&atilde;o apague</span><br>
      <span class="fire">o fogo que Deus<br>acendeu em voc&ecirc;.</span>
    </div>
    <div class="sub">O louvor acende. A presen&ccedil;a<br>transforma. Vem queimar.</div>
    <div class="cta">Bora domingo</div><br>
    <div class="time-pill">7PM &middot; Winter Garden</div>
    <div class="info">607 Avalon Rd</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement('button');b.innerHTML='&#11015; BAIXAR JPG';b.style.cssText='position:fixed;bottom:30px;right:30px;z-index:9999;background:#a855f7;color:#fff;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(168,85,247,0.3)';b.onmouseenter=function(){b.style.background='#c084fc'};b.onmouseleave=function(){b.style.background='#a855f7'};b.onclick=function(){b.style.display='none';html2canvas(document.querySelector('.s'),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement('a');a.download=document.title.replace(/[^a-zA-Z0-9]/g,'-')+'.jpg';a.href=c.toDataURL('image/jpeg',0.95);a.click();b.style.display=''})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
