<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Billy Graham 02 — O Amor de Deus</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(180deg,#000 0%,#1a0f00 45%,#000 100%);overflow:hidden;padding:120px 80px}
.s::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 40%,rgba(212,165,32,0.05) 0%,transparent 45%);z-index:1}
/* Particles */
.p{position:absolute;border-radius:50%;z-index:2;animation:fl 6s ease-in-out infinite}
.p1{width:6px;height:6px;top:18%;left:15%;background:rgba(212,165,32,0.4);animation-delay:0s}
.p2{width:9px;height:9px;top:38%;left:82%;background:rgba(212,165,32,0.5);animation-delay:-1.5s}
.p3{width:5px;height:5px;top:58%;left:8%;background:rgba(212,165,32,0.3);animation-delay:-3s}
.p4{width:7px;height:7px;top:72%;left:72%;background:rgba(212,165,32,0.35);animation-delay:-0.8s}
.p5{width:4px;height:4px;top:28%;left:92%;background:rgba(212,165,32,0.3);animation-delay:-4s}
@keyframes fl{0%,100%{transform:translateY(0) scale(1);opacity:0.3}50%{transform:translateY(-20px) scale(1.5);opacity:0.8}}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
.c{position:relative;z-index:10;text-align:center}
.label{font-size:26px;font-weight:700;letter-spacing:14px;text-transform:uppercase;color:#D4A520;margin-bottom:60px}
.qt{font-size:44px;font-weight:300;line-height:1.55;color:rgba(255,255,255,0.85);margin-bottom:20px;padding:0 20px}
.hl{font-size:72px;font-weight:900;text-transform:uppercase;letter-spacing:-2px;line-height:1.15;color:#D4A520;margin-bottom:50px}
.qdiv{width:100px;height:2px;background:linear-gradient(90deg,transparent,#D4A520,transparent);margin:0 auto 40px}
.sig{font-family:'Great Vibes',cursive;font-size:68px;color:#D4A520;opacity:0.6;margin-bottom:10px}
.auth{font-size:22px;font-weight:700;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.sun{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
.sun .day{font-size:30px;font-weight:700;letter-spacing:12px;text-transform:uppercase;color:#D4A520}
.sun .time{font-size:100px;font-weight:900;color:#fff;letter-spacing:-5px;line-height:1.1}
.sun .addr{font-size:24px;font-weight:300;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-top:5px}
</style>
</head>
<body>
<div class="s">
  <div class="p p1"></div><div class="p p2"></div><div class="p p3"></div><div class="p p4"></div><div class="p p5"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="label">Reflita</div>
    <div class="qt">Deus provou o Seu amor<br>na Cruz. Quando Cristo<br>foi pendurado, sangrou<br>e morreu, era Deus<br>dizendo ao mundo:</div>
    <div class="hl">&ldquo;Eu te amo.&rdquo;</div>
    <div class="qdiv"></div>
    <div class="sig">Billy Graham</div>
    <div class="auth">Billy Graham</div>
  </div>
  <div class="sun">
    <div class="day">Domingo</div>
    <div class="time">7PM</div>
    <div class="addr">607 Avalon Rd &middot; Winter Garden</div>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
