<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Billy Graham 03 — Decisão</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#000;overflow:hidden;padding:120px 80px}
.s::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 35%,rgba(212,165,32,0.07) 0%,transparent 40%);z-index:1}
/* Subtle rays */
.rays{position:absolute;top:0;left:50%;width:300%;height:100%;transform:translateX(-50%);z-index:2;background:linear-gradient(175deg,transparent 38%,rgba(212,165,32,0.015) 43%,transparent 48%),linear-gradient(185deg,transparent 38%,rgba(212,165,32,0.015) 43%,transparent 48%),linear-gradient(170deg,transparent 33%,rgba(212,165,32,0.012) 38%,transparent 43%);opacity:0.9}
/* AV Logo */
.av-logo{position:absolute;top:60px;right:40px;z-index:20}
.av-logo img{width:120px;height:auto;mix-blend-mode:screen}
.c{position:relative;z-index:10;text-align:center}
.tag{font-size:30px;font-weight:200;letter-spacing:16px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:45px}
.intro{font-size:40px;font-weight:300;line-height:1.55;color:rgba(255,255,255,0.6);margin-bottom:25px;padding:0 20px}
.big{font-size:80px;font-weight:900;text-transform:uppercase;letter-spacing:-3px;line-height:1.1;margin-bottom:40px;background:linear-gradient(180deg,#fff 20%,#D4A520 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cta-line{font-family:'Playfair Display',serif;font-size:42px;font-style:italic;color:rgba(255,255,255,0.5);margin-bottom:50px}
.vline{width:2px;height:100px;background:linear-gradient(180deg,transparent,#D4A520,transparent);margin:0 auto 40px}
.sig{font-family:'Great Vibes',cursive;font-size:68px;color:#D4A520;opacity:0.6;margin-bottom:10px}
.auth{font-size:22px;font-weight:700;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:50px}
.badge{display:inline-block;background:#D4A520;color:#000;padding:30px 72px;font-size:30px;font-weight:800;letter-spacing:6px;text-transform:uppercase}
.info{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;white-space:nowrap}
.info p{font-size:26px;font-weight:400;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.25);line-height:2}
</style>
</head>
<body>
<div class="s">
  <div class="rays"></div>
  <div class="av-logo"><img src="../Logobranco_av_orlando.jpeg" alt="AV Orlando"></div>
  <div class="c">
    <div class="tag">Amanh&atilde;</div>
    <div class="intro">Ser crist&atilde;o &eacute; mais do que<br>uma convers&atilde;o instant&acirc;nea &mdash;</div>
    <div class="big">&Eacute; um processo<br>di&aacute;rio.</div>
    <div class="cta-line">Comece o seu neste domingo.</div>
    <div class="vline"></div>
    <div class="sig">Billy Graham</div>
    <div class="auth">Billy Graham</div>
    <div class="badge">Te vejo amanh&atilde;</div>
  </div>
  <div class="info">
    <p>Domingo 7PM &middot; 607 Avalon Road</p>
  </div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
