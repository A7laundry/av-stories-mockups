<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>GC 01</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#08070e;overflow:hidden;padding:120px 80px}
.orb{position:absolute;border-radius:50%;filter:blur(180px);z-index:1}
.o1{width:800px;height:800px;top:-120px;right:-250px;background:rgba(167,139,250,0.2)}
.o2{width:600px;height:600px;bottom:180px;left:-200px;background:rgba(96,165,250,0.15)}
.o3{width:450px;height:450px;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(52,211,153,0.08)}
.grid{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;opacity:0.04;background:repeating-linear-gradient(90deg,transparent,transparent 179px,rgba(255,255,255,0.5) 179px,rgba(255,255,255,0.5) 180px),repeating-linear-gradient(0deg,transparent,transparent 179px,rgba(255,255,255,0.5) 179px,rgba(255,255,255,0.5) 180px)}
.c{position:relative;z-index:10;text-align:center}
.tag{font-size:36px;font-weight:300;letter-spacing:24px;text-transform:uppercase;color:rgba(167,139,250,0.5);margin-bottom:24px}
.title{font-size:160px;font-weight:900;letter-spacing:-10px;line-height:1;margin-bottom:20px;background:linear-gradient(180deg,#fff 30%,rgba(167,139,250,0.6) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:32px;font-weight:500;letter-spacing:14px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:100px}
.dots{display:flex;justify-content:center;gap:24px;margin-bottom:80px}
.dots span{width:12px;height:12px;border-radius:50%;background:rgba(167,139,250,0.4)}
.dots span:nth-child(2){background:rgba(96,165,250,0.5)}
.dots span:nth-child(3){background:rgba(52,211,153,0.4)}
.quote{font-family:'Playfair Display',serif;font-size:66px;font-weight:400;font-style:italic;line-height:1.4;color:rgba(255,255,255,0.85);margin-bottom:40px;padding:0 20px}
.quote strong{font-weight:700;font-style:normal;color:#a78bfa}
.ref{font-size:30px;font-weight:600;letter-spacing:10px;text-transform:uppercase;color:rgba(167,139,250,0.45);margin-bottom:40px}
.bot{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
.bot p{font-size:30px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<div class="s">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="grid"></div>
  <div class="c">
    <div class="tag">Grupo de Encontro</div>
    <div class="title">GC</div>
    <div class="sub">Onde tudo muda</div>
    <div class="dots"><span></span><span></span><span></span></div>
    <div class="quote">&ldquo;Onde dois ou tr&ecirc;s est&atilde;o reunidos em Meu nome, <strong>ali Eu estou</strong> no meio deles.&rdquo;</div>
    <div class="ref">Mateus 18:20</div>
  </div>
  <div class="bot"><p>Quarta &middot; 8PM</p></div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
