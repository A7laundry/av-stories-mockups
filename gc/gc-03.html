<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>GC 03</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#0a0610;overflow:hidden;padding:120px 80px}
.aurora{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;overflow:hidden}
.ab{position:absolute;width:200%;height:900px;filter:blur(240px);opacity:0.12;animation:adrift 12s ease-in-out infinite alternate}
.a1{top:5%;left:-50%;background:linear-gradient(90deg,transparent,#a78bfa,#f472b6,transparent)}
.a2{top:35%;left:-30%;background:linear-gradient(90deg,transparent,#60a5fa,#34d399,transparent);animation-delay:-4s;opacity:0.08}
.a3{bottom:3%;left:-40%;background:linear-gradient(90deg,transparent,#f472b6,#a78bfa,transparent);animation-delay:-8s;opacity:0.06;height:600px}
@keyframes adrift{0%{transform:translateX(0) rotate(-2deg)}100%{transform:translateX(15%) rotate(2deg)}}
.noise{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");background-size:384px 384px}
.c{position:relative;z-index:10;text-align:center}
.gl{font-size:33px;font-weight:300;letter-spacing:30px;text-transform:uppercase;color:rgba(244,114,182,0.35);margin-bottom:30px}
.big{font-size:210px;font-weight:900;letter-spacing:-14px;line-height:0.85;margin-bottom:18px;background:linear-gradient(180deg,#fff 10%,rgba(167,139,250,0.5) 70%,rgba(244,114,182,0.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.enc{font-size:30px;font-weight:600;letter-spacing:24px;text-transform:uppercase;color:rgba(167,139,250,0.35);margin-bottom:90px}
.vt{font-family:'Playfair Display',serif;font-size:66px;font-weight:400;font-style:italic;line-height:1.35;color:rgba(255,255,255,0.85);margin-bottom:30px;padding:0 15px}
.vt em{font-style:normal;font-weight:700;background:linear-gradient(90deg,#a78bfa,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.vs{font-size:42px;font-weight:300;color:rgba(255,255,255,0.35);margin-bottom:50px;line-height:1.5}
.vr{font-size:30px;font-weight:600;letter-spacing:10px;text-transform:uppercase;color:rgba(244,114,182,0.35)}
.bot{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
.bot p{font-size:30px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>
<div class="s">
  <div class="aurora"><div class="ab a1"></div><div class="ab a2"></div><div class="ab a3"></div></div>
  <div class="noise"></div>
  <div class="c">
    <div class="gl">Grupo de Encontro</div>
    <div class="big">GC</div>
    <div class="enc">Onde vidas se cruzam</div>
    <div class="vt">&ldquo;Assim como o ferro afia o ferro, o homem &eacute; afiado pelo <em>conv&iacute;vio</em> com seu pr&oacute;ximo.&rdquo;</div>
    <div class="vs">Sua hist&oacute;ria muda quando<br>voc&ecirc; se conecta.</div>
    <div class="vr">Prov&eacute;rbios 27:17</div>
  </div>
  <div class="bot"><p>Quarta &middot; 8PM</p></div>
</div>
