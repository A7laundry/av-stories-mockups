<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>GC 04</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{font-family:'Montserrat',sans-serif;color:#fff}
.s{width:1080px;height:1920px;position:relative;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#07080f;overflow:hidden;padding:120px 80px}
/* Glassmorphism card bg */
.glass-orb{position:absolute;border-radius:50%;filter:blur(150px);z-index:1}
.go1{width:700px;height:700px;top:15%;left:-15%;background:rgba(96,165,250,0.15)}
.go2{width:500px;height:500px;bottom:10%;right:-10%;background:rgba(167,139,250,0.12)}
.go3{width:350px;height:350px;top:45%;right:20%;background:rgba(244,114,182,0.06)}
/* Glass card */
.glass{position:absolute;z-index:3;border-radius:40px;border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.g1{width:300px;height:300px;top:12%;left:8%;background:rgba(255,255,255,0.015);transform:rotate(-12deg)}
.g2{width:250px;height:400px;bottom:15%;right:5%;background:rgba(255,255,255,0.01);transform:rotate(8deg)}
.g3{width:180px;height:180px;top:35%;right:12%;background:rgba(255,255,255,0.02);transform:rotate(-5deg);border-radius:50%}
.c{position:relative;z-index:10;text-align:center}
.tag{font-size:30px;font-weight:300;letter-spacing:20px;text-transform:uppercase;color:rgba(96,165,250,0.4);margin-bottom:20px}
.big{font-size:180px;font-weight:900;letter-spacing:-12px;line-height:0.9;margin-bottom:15px;background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 50%,#f472b6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:28px;font-weight:600;letter-spacing:18px;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:100px}
.line{width:180px;height:2px;background:linear-gradient(90deg,transparent,rgba(96,165,250,0.3),transparent);margin:0 auto 70px}
.quote{font-family:'Playfair Display',serif;font-size:60px;font-weight:400;font-style:italic;line-height:1.4;color:rgba(255,255,255,0.85);margin-bottom:30px;padding:0 30px}
.quote strong{font-weight:700;font-style:normal;color:#60a5fa}
.author{font-size:38px;font-weight:300;color:rgba(255,255,255,0.35);margin-bottom:80px;line-height:1.5}
.badge{display:inline-block;padding:28px 60px;border-radius:20px;border:2px solid rgba(96,165,250,0.3);font-size:28px;font-weight:700;letter-spacing:8px;text-transform:uppercase;color:rgba(96,165,250,0.8);background:rgba(96,165,250,0.05)}
.bot{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);text-align:center;z-index:10}
.bot p{font-size:30px;font-weight:400;letter-spacing:10px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>
<div class="s">
  <div class="glass-orb go1"></div>
  <div class="glass-orb go2"></div>
  <div class="glass-orb go3"></div>
  <div class="glass g1"></div>
  <div class="glass g2"></div>
  <div class="glass g3"></div>
  <div class="c">
    <div class="tag">Grupo de Encontro</div>
    <div class="big">GC</div>
    <div class="sub">Acolhimento</div>
    <div class="line"></div>
    <div class="quote">&ldquo;Levem as <strong>cargas</strong> uns dos outros e assim cumprir&atilde;o a lei de Cristo.&rdquo;</div>
    <div class="author">Aqui ningu&eacute;m caminha sozinho.<br>Sua hist&oacute;ria tem lugar entre n&oacute;s.</div>
    <div class="badge">G&aacute;latas 6:2</div>
  </div>
  <div class="bot"><p>Quarta &middot; 8PM</p></div>
</div>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
if(window===window.top){var b=document.createElement("button");b.innerHTML="\u2B07 BAIXAR JPG";b.style.cssText="position:fixed;bottom:30px;right:30px;z-index:9999;background:#D4A520;color:#000;border:none;padding:16px 32px;font-family:Montserrat,sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;box-shadow:0 4px 20px rgba(212,165,32,0.3)";b.onmouseenter=function(){b.style.background="#E6C44A"};b.onmouseleave=function(){b.style.background="#D4A520"};b.onclick=function(){b.style.display="none";html2canvas(document.querySelector(".s"),{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true}).then(function(c){var a=document.createElement("a");a.download=document.title.replace(/[^a-zA-Z0-9]/g,"-")+".png";a.href=c.toDataURL("image/png");a.click();b.style.display=""})};document.body.appendChild(b)}if(window===window.top){var bk=document.createElement("a");bk.innerHTML="&#8592; PAINEL";bk.href="../painel.html";bk.style.cssText="position:fixed;top:30px;left:30px;z-index:9999;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);text-decoration:none;padding:14px 28px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border-radius:8px;backdrop-filter:blur(10px)";bk.onmouseenter=function(){bk.style.background="rgba(255,255,255,0.15)";bk.style.color="#fff"};bk.onmouseleave=function(){bk.style.background="rgba(255,255,255,0.08)";bk.style.color="rgba(255,255,255,0.6)"};document.body.appendChild(bk)}
</script>
</body>
</html>
